services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ntnx-translator-backend
    restart: unless-stopped
    environment:
      PORT: ${PORT:-4000}
      NODE_ENV: production
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:4000}
    container_name: ntnx-translator-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
